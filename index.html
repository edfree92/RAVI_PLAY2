<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DINET - LOYAL FRIENDS 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* =====================================================
   🎨 ESTILOS GENERALES
===================================================== */

:root{
  --btn-next:#00d084;
  --btn-back:#6c757d;
  --btn-action:#ff9800;
  --btn-final:#2196f3;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  height:100%;
  font-family: Arial, sans-serif;
  background:#0b0f14;
}

.stage{
  height:100vh;
  width:100vw;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding:40px;
  gap:20px;
}

.btn{
  padding:14px 28px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
  color:white;
}

.next{ background:var(--btn-next); }
.back{ background:var(--btn-back); }
.action{ background:var(--btn-action); }
.final{ background:var(--btn-final); }

.btn:hover{
  transform:translateY(-2px);
  opacity:0.9;
}

/* ================= MODAL PREGUNTAS ================= */

#questionModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#1c2430;
  width:90%;
  max-width:800px;
  padding:30px;
  border-radius:20px;
  color:white;
}

.option-row{
  margin-bottom:12px;
  padding:12px;
  border:1px solid #555;
  border-radius:8px;
}

</style>
</head>

<body>

<!-- =====================================================
   🟢 ESCENARIO PRINCIPAL
===================================================== -->
<div class="stage" id="stage"></div>


<!-- =====================================================
   🔵 MODAL DE PREGUNTAS (PARTE 2)
===================================================== -->
<div id="questionModal">
  <div class="modal-box">

    <h2 id="questionTitle"></h2>

    <div id="optionsContainer"></div>

    <div style="margin-top:20px; display:flex; justify-content:space-between;">
      <button id="registerAnswerBtn" class="btn action">
        REGISTRAR RESPUESTA
      </button>
      <button id="closeQuestionBtn" class="btn back">
        CERRAR
      </button>
    </div>

  </div>
</div>



<script>

/* =====================================================
   🟡 PARTE 1 — MOTOR DE ESCENAS
===================================================== */

const scenes = [
  { id:1, type:"INITIAL", bg:"./BASE/1.jpg" },
  { id:2, type:"NARRATIVE", bg:"./BASE/2.jpg" },
  { id:3, type:"NARRATIVE", bg:"./BASE/3.jpg" },
  { id:4, type:"NARRATIVE", bg:"./BASE/4.jpg" },
  { id:5, type:"QUESTION", bg:"./BASE/5.jpg" },
  { id:6, type:"QUESTION", bg:"./BASE/6.jpg" },
  { id:7, type:"QUESTION", bg:"./BASE/7.jpg" },
  { id:8, type:"QUESTION", bg:"./BASE/8.jpg" },
  { id:9, type:"NARRATIVE", bg:"./BASE/9.jpg" },
  { id:10, type:"NARRATIVE", bg:"./BASE/10.jpg" },
  { id:11, type:"FINAL", bg:"./BASE/11.jpg" }
];

let gameState = {
  currentScene:1,
  teamA:{ players:[], score:0 },
  teamB:{ players:[], score:0 },
  answers:[]
};

const stage = document.getElementById("stage");

function renderScene(id){

  const scene = scenes.find(s => s.id === id);
  if(!scene) return;

  gameState.currentScene = id;

  stage.style.backgroundImage =
  `linear-gradient(
    to top,
    rgba(0,0,0,0.65) 0%,
    rgba(0,0,0,0.20) 50%,
    rgba(0,0,0,0.00) 100%
  ), url("${scene.bg}")`;

  stage.innerHTML = "";

  if(scene.type === "INITIAL") renderInitial();
  if(scene.type === "NARRATIVE") renderNarrative();
  if(scene.type === "QUESTION") renderQuestion();
  if(scene.type === "FINAL") renderFinal();
}



/* =====================================================
   🟡 PARTE 2 — CONFIGURACIÓN DE LAS 4 PREGUNTAS
===================================================== */

const questions = {

  5:{
    text:"¿QUE ACCION REALIZAR ANTE ESTA SITUACION?",
    options:[
      { id:"A", text:"Corregirle en el momento para evitar daño al producto.", points:10 },
      { id:"B", text:"Corregirle y explicarle brevemente el significado del pictograma.", points:15 },
      { id:"C", text:"Corregir, explicarle y reforzar el estándar en la reunión de inicio de turno.", points:20 },
      { id:"D", text:"Dejar que el supervisor lo maneje luego.", points:5 }
    ]
  },

  6:{
    text:"¿QUE ACCION REALIZAR ANTE ESTA SITUACION?",
    options:[
      { id:"A", text:"Reordenar el pallet afectado para continuar operación.", points:10 },
      { id:"B", text:"Tomar foto y reportar desorden al supervisor.", points:15 },
      { id:"C", text:"Tomar foto, reportar incidencia y explicar al compañero.", points:20 },
      { id:"D", text:"Mover temporalmente a otro pasillo para liberar flujo.", points:5 }
    ]
  },

  7:{
    text:"¿QUE ACCION REALIZAR ANTE ESTA SITUACION?",
    options:[
      { id:"A", text:"Mover un pallet para liberar puerta.", points:10 },
      { id:"B", text:"Llamar a los chicos del pasillo para mover pallets.", points:15 },
      { id:"C", text:"Tomar foto, reportar incidencia y explicar al compañero.", points:20 },
      { id:"D", text:"Tomar foto y continuar con inventario.", points:5 }
    ]
  },

  8:{
    text:"¿Qué MOVIMIENTOS SE PUEDEN RASTREAR EN EL SISTEMA WMS QUE PUEDEN GENERAR UN DESCUADRE EN PMM?",
    options:[
      { id:"A", text:"Revisar la cantidad de cajas picadas en el pasillo.", points:10 },
      { id:"B", text:"Mercadería paletizada con PL0 cuando debió ser PL1.", points:15 },
      { id:"C", text:"Revisar ajustes de códigos prepack en la 204.", points:20 },
      { id:"D", text:"Revisar si faltan cursos en ingenio.", points:0 }
    ]
  }

};



/* =====================================================
   🔴 AQUÍ VA PARTE 3 — SISTEMA DE PUNTAJES
===================================================== */

function registerAnswer(){

  const question = questions[gameState.currentScene];
  if(!question) return;

  // Obtener selección de cada equipo
  const selectedA = document.querySelector('input[name="A"]:checked');
  const selectedB = document.querySelector('input[name="B"]:checked');

  if(!selectedA || !selectedB){
    alert("Ambos equipos deben seleccionar una opción.");
    return;
  }

  // Buscar puntos según opción elegida
  const optionA = question.options.find(o => o.id === selectedA.value);
  const optionB = question.options.find(o => o.id === selectedB.value);

  const pointsA = optionA ? optionA.points : 0;
  const pointsB = optionB ? optionB.points : 0;

  // Sumar puntaje
  gameState.teamA.score += pointsA;
  gameState.teamB.score += pointsB;

  // Guardar historial
  gameState.answers.push({
    scene: gameState.currentScene,
    teamA: { option:selectedA.value, points:pointsA },
    teamB: { option:selectedB.value, points:pointsB }
  });

  console.log("Historial:", gameState.answers);
  console.log("Score A:", gameState.teamA.score);
  console.log("Score B:", gameState.teamB.score);

  // Cerrar modal
  document.getElementById("questionModal").style.display = "none";

}



/* =====================================================
   🔴 CONECTAR BOTÓN REGISTRAR
===================================================== */

document.getElementById("registerAnswerBtn").onclick = registerAnswer;


/* =====================================================
   🔴 AQUÍ VA PARTE 4 — RANKING FINAL
===================================================== */

/* =====================================================
   🔴 PARTE 4 — RANKING FINAL
===================================================== */

// Crear modal de ranking dinámicamente
const rankingModal = document.createElement("div");
rankingModal.style.display = "none";
rankingModal.style.position = "fixed";
rankingModal.style.inset = "0";
rankingModal.style.background = "rgba(0,0,0,0.75)";
rankingModal.style.backdropFilter = "blur(5px)";
rankingModal.style.justifyContent = "center";
rankingModal.style.alignItems = "center";

rankingModal.innerHTML = `
  <div style="
    background:#1c2430;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:600px;
    text-align:center;
    color:white;
  ">
    <h2 style="margin-bottom:20px;">🏆 RESULTADOS FINALES</h2>

    <div id="rankingContent" style="font-size:18px; margin-bottom:30px;"></div>

    <button id="closeRankingBtn" class="btn final">
      FINALIZAR Y VOLVER AL INICIO
    </button>
  </div>
`;

document.body.appendChild(rankingModal);


// Función para mostrar ranking
function showRanking(){

  const scoreA = gameState.teamA.score;
  const scoreB = gameState.teamB.score;

  let resultText = `
    <p><strong>Equipo A:</strong> ${scoreA} pts</p>
    <p><strong>Equipo B:</strong> ${scoreB} pts</p>
    <hr style="margin:20px 0;">
  `;

  if(scoreA > scoreB){
    resultText += `<h3>🥇 GANADOR: EQUIPO A</h3>`;
  } 
  else if(scoreB > scoreA){
    resultText += `<h3>🥇 GANADOR: EQUIPO B</h3>`;
  } 
  else{
    resultText += `<h3>🤝 EMPATE</h3>`;
  }

  document.getElementById("rankingContent").innerHTML = resultText;
  rankingModal.style.display = "flex";
}


// Botón cerrar ranking
document.addEventListener("click", function(e){
  if(e.target && e.target.id === "closeRankingBtn"){
    
    // Reset juego
    gameState.teamA.score = 0;
    gameState.teamB.score = 0;
    gameState.answers = [];

    rankingModal.style.display = "none";
    renderScene(1);
  }
});


// Conectar botón "VER PUNTUACIÓN" de escena final
function renderFinal(){
  stage.appendChild(createButton("VER PUNTUACIÓN","final",showRanking));
}

/* =====================================================
   🔴 AQUÍ VA PARTE 5 — CONFIGURACIÓN API
===================================================== */



/* =====================================================
   🔴 AQUÍ VA PARTE 6 — ENVÍO A BACKEND
===================================================== */



/* =====================================================
   🟢 RENDERS
===================================================== */

function createButton(text, cssClass, action){
  const btn = document.createElement("button");
  btn.textContent = text;
  btn.className = "btn " + cssClass;
  btn.onclick = action;
  return btn;
}

function renderInitial(){
  stage.appendChild(createButton("REGISTRO","action",()=>alert("Registro pendiente")));
  stage.appendChild(createButton("SIGUIENTE","next",()=>renderScene(2)));
}

function renderNarrative(){
  stage.appendChild(createButton("ATRÁS","back",()=>renderScene(gameState.currentScene-1)));
  stage.appendChild(createButton("SIGUIENTE","next",()=>renderScene(gameState.currentScene+1)));
}

function renderQuestion(){
  stage.appendChild(createButton("ATRÁS","back",()=>renderScene(gameState.currentScene-1)));
  stage.appendChild(createButton("RESPONDER","action",openQuestionModal));
  stage.appendChild(createButton("SIGUIENTE","next",()=>renderScene(gameState.currentScene+1)));
}





/* =====================================================
   🟢 MODAL LÓGICA
===================================================== */

function openQuestionModal(){

  const question = questions[gameState.currentScene];
  if(!question) return;

  document.getElementById("questionTitle").textContent = question.text;

  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  question.options.forEach(opt=>{
    const row = document.createElement("div");
    row.className = "option-row";

    row.innerHTML = `
      <strong>${opt.id})</strong> ${opt.text}
      <div style="margin-top:5px;">
        Equipo A <input type="radio" name="A" value="${opt.id}">
        Equipo B <input type="radio" name="B" value="${opt.id}">
      </div>
    `;

    container.appendChild(row);
  });

  document.getElementById("questionModal").style.display = "flex";
}

document.getElementById("closeQuestionBtn").onclick = ()=>{
  document.getElementById("questionModal").style.display = "none";
};




/* =====================================================
   🟢 INICIALIZACIÓN
===================================================== */

renderScene(1);

</script>

</body>
</html>
