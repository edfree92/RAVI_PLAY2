<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DINET - LOYAL FRIENDS 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    /* =====================================================
       ESTILOS GENERALES
    ===================================================== */

    :root {
      --btn-next:   #00d084;
      --btn-back:   #6c757d;
      --btn-action: #ff9800;
      --btn-final:  #2196f3;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #0b0f14;
    }

    /* ---- Escenario principal ---- */
    .stage {
      height: 100vh;
      width: 100vw;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding: 40px;
      gap: 20px;
      transition: opacity 0.6s ease;   /* fade suave */
    }

    .stage.fade-out { opacity: 0; }
    .stage.fade-in  { opacity: 1; }

    /* ---- Botones ---- */
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      color: white;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .next   { background: var(--btn-next);   }
    .back   { background: var(--btn-back);   }
    .action { background: var(--btn-action); }
    .final  { background: var(--btn-final);  }

    /* ---- Base modal (overlay) ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
    }

    /* ---- Caja interior de modal ---- */
    .modal-box {
      background: #1c2430;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      color: white;
    }

    .modal-box h2 {
      margin-top: 0;
      text-align: center;
    }

    /* ---- Fila de opciones (preguntas) ---- */
    .option-row {
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid #555;
      border-radius: 8px;
    }

    /* ---- Inputs de registro ---- */
    .reg-input {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f1720;
      color: white;
      font-size: 14px;
    }

    .reg-input::placeholder { color: #888; }

    /* ---- Footer de modal (botones) ---- */
    .modal-footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
    }

    /* ---- Ranking ---- */
    #rankingModal .modal-box {
      max-width: 600px;
      text-align: center;
    }

    #rankingContent {
      font-size: 18px;
      margin-bottom: 30px;
    }

  </style>
</head>

<body>

  <!-- =====================================================
       ESCENARIO PRINCIPAL
  ===================================================== -->
  <div class="stage" id="stage"></div>


  <!-- =====================================================
       MODAL: PREGUNTAS
  ===================================================== -->
  <div id="questionModal" class="modal-overlay">
    <div class="modal-box">

      <h2 id="questionTitle"></h2>

      <div id="optionsContainer"></div>

      <div class="modal-footer">
        <button id="registerAnswerBtn" class="btn action">REGISTRAR RESPUESTA</button>
        <button id="closeQuestionBtn"  class="btn back">CERRAR</button>
      </div>

    </div>
  </div>


  <!-- =====================================================
       MODAL: REGISTRO DE EQUIPOS
  ===================================================== -->
  <div id="registerModal" class="modal-overlay">
    <div class="modal-box" style="max-width:700px;">

      <h2>REGISTRO DE EQUIPOS</h2>

      <div style="display:flex; gap:20px; margin-top:20px;">

        <div style="flex:1;">
          <h3>GRUPO A</h3>
          <input class="reg-input regA" placeholder="Nombre 1">
          <input class="reg-input regA" placeholder="Nombre 2">
          <input class="reg-input regA" placeholder="Nombre 3">
          <input class="reg-input regA" placeholder="Nombre 4">
          <input class="reg-input regA" placeholder="Nombre 5">
        </div>

        <div style="flex:1;">
          <h3>GRUPO B</h3>
          <input class="reg-input regB" placeholder="Nombre 1">
          <input class="reg-input regB" placeholder="Nombre 2">
          <input class="reg-input regB" placeholder="Nombre 3">
          <input class="reg-input regB" placeholder="Nombre 4">
          <input class="reg-input regB" placeholder="Nombre 5">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn back" onclick="closeRegisterModal()">CERRAR</button>
        <button class="btn next" onclick="saveTeams()">CONTINUAR</button>
      </div>

    </div>
  </div>


  <!-- =====================================================
       MODAL: RANKING FINAL
  ===================================================== -->
  <div id="rankingModal" class="modal-overlay">
    <div class="modal-box">

      <h2>🏆 RESULTADOS FINALES</h2>

      <div id="rankingContent"></div>

      <button id="closeRankingBtn" class="btn final">FINALIZAR Y VOLVER AL INICIO</button>

    </div>
  </div>


  <!-- =====================================================
       MODAL: RESULTADO DE PREGUNTA CON IMAGEN RAVI
  ===================================================== -->
  <div id="resultModal" class="modal-overlay">
    <div class="modal-box" style="max-width:950px; display:flex; gap:40px; align-items:center;">

      <!-- Imagen -->
      <div style="flex:1; display:flex; justify-content:center; align-items:center;">
        <div style="background:#0f1720; padding:20px; border-radius:20px; box-shadow:0 0 25px rgba(0,0,0,0.6);">
          <img src="./BASE/R1.jpg" style="width:340px; border-radius:18px; display:block;">
        </div>
      </div>

      <!-- Contenido resultado -->
      <div style="flex:1.3;">
        <h2 style="margin-top:0;">RESULTADO DE LA PREGUNTA</h2>
        <div id="resultDynamicContent" style="font-size:16px; line-height:1.6;"></div>
        <div style="margin-top:30px; text-align:center;">
          <button id="continueAfterResultBtn" class="btn next">CONTINUAR</button>
        </div>
      </div>

    </div>
  </div>


  <script>

    /* =====================================================
       PARTE 1 — MOTOR DE ESCENAS
    ===================================================== */

    const scenes = [
      { id:1,  type:"INITIAL",   bg:"./BASE/1.jpg"  },
      { id:2,  type:"NARRATIVE", bg:"./BASE/2.jpg"  },
      { id:3,  type:"NARRATIVE", bg:"./BASE/3.jpg"  },
      { id:4,  type:"NARRATIVE", bg:"./BASE/4.jpg"  },
      { id:5,  type:"QUESTION",  bg:"./BASE/5.jpg"  },
      { id:6,  type:"QUESTION",  bg:"./BASE/6.jpg"  },
      { id:7,  type:"QUESTION",  bg:"./BASE/7.jpg"  },
      { id:8,  type:"QUESTION",  bg:"./BASE/8.jpg"  },
      { id:9,  type:"NARRATIVE", bg:"./BASE/9.jpg"  },
      { id:10, type:"NARRATIVE", bg:"./BASE/10.jpg" },
      { id:11, type:"FINAL",     bg:"./BASE/11.jpg" }
    ];

    let gameState = {
      currentScene: 1,
      teamA: { players: [], score: 0 },
      teamB: { players: [], score: 0 },
      answers: []
    };

    const stage = document.getElementById("stage");

    // Declarado con let para poder ser sobreescrito por el wrapper de fade más abajo
    let renderScene = function(id) {
      const scene = scenes.find(s => s.id === id);
      if (!scene) return;

      gameState.currentScene = id;

      stage.style.backgroundImage = `
        linear-gradient(
          to top,
          rgba(0,0,0,0.65) 0%,
          rgba(0,0,0,0.20) 50%,
          rgba(0,0,0,0.00) 100%
        ), url("${scene.bg}")
      `;

      stage.innerHTML = "";

      if (scene.type === "INITIAL")   renderInitial();
      if (scene.type === "NARRATIVE") renderNarrative();
      if (scene.type === "QUESTION")  renderQuestion();
      if (scene.type === "FINAL")     renderFinal();
    };


    /* =====================================================
       LÓGICA — REGISTRO DE EQUIPOS
    ===================================================== */

    function openRegisterModal() {
      document.getElementById("registerModal").style.display = "flex";
    }

    function closeRegisterModal() {
      document.getElementById("registerModal").style.display = "none";
    }

    function saveTeams() {
      gameState.teamA.players = [];
      gameState.teamB.players = [];

      document.querySelectorAll(".regA").forEach(input => {
        if (input.value.trim() !== "") gameState.teamA.players.push(input.value.trim());
      });

      document.querySelectorAll(".regB").forEach(input => {
        if (input.value.trim() !== "") gameState.teamB.players.push(input.value.trim());
      });

      console.log("Equipo A:", gameState.teamA.players);
      console.log("Equipo B:", gameState.teamB.players);

      closeRegisterModal();
      renderScene(2);
    }


    /* =====================================================
       PARTE 2 — CONFIGURACIÓN DE LAS 4 PREGUNTAS
    ===================================================== */

    const questions = {

      5: {
        text: "¿QUE ACCION REALIZAR ANTE ESTA SITUACION?",
        options: [
          { id:"A", text:"Corregirle en el momento para evitar daño al producto.",                        points: 10 },
          { id:"B", text:"Corregirle y explicarle brevemente el significado del pictograma.",             points: 15 },
          { id:"C", text:"Corregir, explicarle y reforzar el estándar en la reunión de inicio de turno.", points: 20 },
          { id:"D", text:"Dejar que el supervisor lo maneje luego.",                                      points:  5 }
        ]
      },

      6: {
        text: "¿QUE ACCION REALIZAR ANTE ESTA SITUACION?",
        options: [
          { id:"A", text:"Reordenar el pallet afectado para continuar operación.",   points: 10 },
          { id:"B", text:"Tomar foto y reportar desorden al supervisor.",             points: 15 },
          { id:"C", text:"Tomar foto, reportar incidencia y explicar al compañero.", points: 20 },
          { id:"D", text:"Mover temporalmente a otro pasillo para liberar flujo.",   points:  5 }
        ]
      },

      7: {
        text: "¿QUE ACCION REALIZAR ANTE ESTA SITUACION?",
        options: [
          { id:"A", text:"Mover un pallet para liberar puerta.",                     points: 10 },
          { id:"B", text:"Llamar a los chicos del pasillo para mover pallets.",       points: 15 },
          { id:"C", text:"Tomar foto, reportar incidencia y explicar al compañero.", points: 20 },
          { id:"D", text:"Tomar foto y continuar con inventario.",                   points:  5 }
        ]
      },

      8: {
        text: "¿Qué MOVIMIENTOS SE PUEDEN RASTREAR EN EL SISTEMA WMS QUE PUEDEN GENERAR UN DESCUADRE EN PMM?",
        options: [
          { id:"A", text:"Revisar la cantidad de cajas picadas en el pasillo.", points: 10 },
          { id:"B", text:"Mercadería paletizada con PL0 cuando debió ser PL1.", points: 15 },
          { id:"C", text:"Revisar ajustes de códigos prepack en la 204.",        points: 20 },
          { id:"D", text:"Revisar si faltan cursos en ingenio.",                 points:  0 }
        ]
      }

    };


    /* =====================================================
       PARTE 3 — SISTEMA DE PUNTAJES
    ===================================================== */

    // Declarado con let para poder ser sobreescrito por el wrapper de resultado más abajo
    let registerAnswer = function() {
      const question = questions[gameState.currentScene];
      if (!question) {
        closeQuestionModal();
        return;
      }

      const selectedA = document.querySelector('input[name="A"]:checked');
      const selectedB = document.querySelector('input[name="B"]:checked');

      if (!selectedA || !selectedB) {
        console.log("Respuesta no registrada. Flujo continúa.");
        closeQuestionModal();
        return;
      }

      const optionA = question.options.find(o => o.id === selectedA.value);
      const optionB = question.options.find(o => o.id === selectedB.value);

      const pointsA = optionA ? optionA.points : 0;
      const pointsB = optionB ? optionB.points : 0;

      gameState.teamA.score += pointsA;
      gameState.teamB.score += pointsB;

      gameState.answers.push({
        scene: gameState.currentScene,
        teamA: { option: selectedA.value, points: pointsA },
        teamB: { option: selectedB.value, points: pointsB }
      });

      console.log("Respuesta registrada:", gameState.answers);

      closeQuestionModal();
    };


    /* =====================================================
       PARTE 4 — RANKING FINAL
    ===================================================== */

    function showRanking() {
      const scoreA = gameState.teamA.score;
      const scoreB = gameState.teamB.score;

      let resultText = `
        <p><strong>Equipo A:</strong> ${scoreA} pts</p>
        <p><strong>Equipo B:</strong> ${scoreB} pts</p>
        <hr style="margin:20px 0;">
      `;

      if      (scoreA > scoreB) resultText += `<h3>🥇 GANADOR: EQUIPO A</h3>`;
      else if (scoreB > scoreA) resultText += `<h3>🥇 GANADOR: EQUIPO B</h3>`;
      else                      resultText += `<h3>🤝 EMPATE</h3>`;

      document.getElementById("rankingContent").innerHTML = resultText;
      document.getElementById("rankingModal").style.display = "flex";
    }

    document.getElementById("closeRankingBtn").addEventListener("click", function () {
      gameState.teamA.score = 0;
      gameState.teamB.score = 0;
      gameState.answers     = [];

      document.getElementById("rankingModal").style.display = "none";
      renderScene(1);
    });


    /* =====================================================
       RENDERS
    ===================================================== */

    function createButton(text, cssClass, action) {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.className   = "btn " + cssClass;
      btn.onclick     = action;
      return btn;
    }

    function renderInitial() {
      stage.appendChild(createButton("REGISTRO",  "action", openRegisterModal));
      stage.appendChild(createButton("SIGUIENTE", "next",   () => renderScene(2)));
    }

    function renderNarrative() {
      stage.appendChild(createButton("ATRÁS",     "back", () => renderScene(gameState.currentScene - 1)));
      stage.appendChild(createButton("SIGUIENTE", "next", () => renderScene(gameState.currentScene + 1)));
    }

    function renderQuestion() {
      stage.appendChild(createButton("ATRÁS",     "back",   () => renderScene(gameState.currentScene - 1)));
      stage.appendChild(createButton("RESPONDER", "action", openQuestionModal));
      stage.appendChild(createButton("SIGUIENTE", "next",   () => renderScene(gameState.currentScene + 1)));
    }

    function renderFinal() {
      stage.appendChild(createButton("VER PUNTUACIÓN", "final", showRanking));
    }


    /* =====================================================
       MODAL — LÓGICA DE PREGUNTAS
    ===================================================== */

    function openQuestionModal() {
      const question = questions[gameState.currentScene];
      if (!question) return;

      document.getElementById("questionTitle").textContent = question.text;

      const container = document.getElementById("optionsContainer");
      container.innerHTML = "";

      question.options.forEach(opt => {
        const row = document.createElement("div");
        row.className = "option-row";
        row.innerHTML = `
          <strong>${opt.id})</strong> ${opt.text}
          <div style="margin-top:5px;">
            Equipo A <input type="radio" name="A" value="${opt.id}">
            &nbsp;&nbsp;
            Equipo B <input type="radio" name="B" value="${opt.id}">
          </div>
        `;
        container.appendChild(row);
      });

      document.getElementById("questionModal").style.display = "flex";
    }

    function closeQuestionModal() {
      document.getElementById("questionModal").style.display = "none";
    }

    document.getElementById("registerAnswerBtn").addEventListener("click", () => registerAnswer());
    document.getElementById("closeQuestionBtn").addEventListener("click",  closeQuestionModal);


    /* =====================================================
       SISTEMA: MODAL RESULTADO CON IMAGEN RAVI
       (hook sobre registerAnswer — no modifica lógica base)
    ===================================================== */

    function showResultAfterRegister() {
      const lastAnswer = gameState.answers[gameState.answers.length - 1];
      if (!lastAnswer) return;

      const question   = questions[lastAnswer.scene];
      const optionA    = question.options.find(o => o.id === lastAnswer.teamA.option);
      const optionB    = question.options.find(o => o.id === lastAnswer.teamB.option);
      const bestOption = question.options.reduce((max, current) =>
        current.points > max.points ? current : max
      );

      const content = `
        <p><strong>Equipo A respondió:</strong> ${optionA.id}) ${optionA.text}
           <span style="color:#00d084;"> +${lastAnswer.teamA.points} pts</span></p>
        <p><strong>Equipo B respondió:</strong> ${optionB.id}) ${optionB.text}
           <span style="color:#00d084;"> +${lastAnswer.teamB.points} pts</span></p>
        <hr style="margin:20px 0; border-color:#444;">
        <p><strong>🏆 Mejor respuesta:</strong>
           ${bestOption.id}) ${bestOption.text}
           <span style="color:#ffd700;"> +${bestOption.points} pts</span></p>
        <hr style="margin:20px 0; border-color:#444;">
        <p><strong>Marcador actual:</strong></p>
        <p>Equipo A: ${gameState.teamA.score} pts</p>
        <p>Equipo B: ${gameState.teamB.score} pts</p>
      `;

      document.getElementById("resultDynamicContent").innerHTML = content;
      document.getElementById("resultModal").style.display = "flex";
    }

    // Wrapper: ejecuta la lógica base y luego muestra el resultado si se registró
    const _baseRegisterAnswer = registerAnswer;
    registerAnswer = function() {
      const prevCount = gameState.answers.length;
      _baseRegisterAnswer();
      if (gameState.answers.length > prevCount) {
        setTimeout(showResultAfterRegister, 200);
      }
    };

    document.getElementById("continueAfterResultBtn").addEventListener("click", function () {
      document.getElementById("resultModal").style.display = "none";
      renderScene(gameState.currentScene + 1);
    });


    /* =====================================================
       TRANSICIÓN DE ESCENAS CON FADE SUAVE
       (wrapper sobre renderScene — no modifica lógica base)
    ===================================================== */

    const _baseRenderScene = renderScene;
    renderScene = function(id) {
      stage.classList.add("fade-out");
      setTimeout(() => {
        _baseRenderScene(id);
        stage.classList.remove("fade-out");
        stage.classList.add("fade-in");
        setTimeout(() => {
          stage.classList.remove("fade-in");
        }, 600);
      }, 400);
    };


    /* =====================================================
       INICIALIZACIÓN
    ===================================================== */

    renderScene(1);

  </script>

</body>
</html>
