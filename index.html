<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DINET - LOYAL FRIENDS 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    /* ==========================================================
       ESTILOS — DINET LOYAL FRIENDS 2
    ========================================================== */

    :root {
      --btn-next:    #00d084;
      --btn-back:    #6c757d;
      --btn-action:  #ff9800;
      --btn-final:   #2196f3;
      --btn-danger:  #e53935;
      --btn-primary: #7c4dff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #0b0f14;
    }

    /* ── Escenario principal ── */
    .stage {
      height: 100vh;
      width: 100vw;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding: 40px;
      gap: 20px;
      transition: opacity 0.6s ease;
    }

    .stage.map-mode {
      align-items: stretch;
      padding: 0;
    }

    .stage.fade-out { opacity: 0; }
    .stage.fade-in  { opacity: 1; }

    /* ── Botones ── */
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      color: white;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .next    { background: var(--btn-next);    }
    .back    { background: var(--btn-back);    }
    .action  { background: var(--btn-action);  }
    .final   { background: var(--btn-final);   }
    .danger  { background: var(--btn-danger);  }
    .primary { background: var(--btn-primary); }

    /* ── Modales ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-box {
      background: #1c2430;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      color: white;
      max-height: 92vh;
      overflow-y: auto;
    }

    .modal-box h2 {
      margin-top: 0;
      text-align: center;
    }

    /* ── Opciones de preguntas ── */
    .option-row {
      margin-bottom: 12px;
      padding: 12px 16px;
      border: 1px solid #555;
      border-radius: 8px;
      transition: border-color 0.2s, background 0.2s;
    }

    .option-row:hover {
      border-color: #ff9800;
      background: rgba(255,152,0,0.05);
    }

    .option-radios label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-right: 20px;
      cursor: pointer;
      font-size: 14px;
      color: #ccc;
    }

    .option-radios input[type="radio"] {
      accent-color: #ff9800;
      width: 16px;
      height: 16px;
    }

    /* ── Inputs de registro ── */
    .reg-input {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f1720;
      color: white;
      font-size: 14px;
    }

    .reg-input::placeholder { color: #888; }

    /* ── Input nombre de equipo (destacado) ── */
    .team-name-input {
      display: block;
      width: 100%;
      margin-bottom: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 2px solid #7c4dff;
      background: #0f1720;
      color: white;
      font-size: 15px;
      font-weight: bold;
    }
    .team-name-input::placeholder { color: #666; }

    /* ── Footer de modal ── */
    .modal-footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Ranking ── */
    #rankingModal .modal-box { max-width: 680px; }
    #rankingContent { font-size: 16px; margin-bottom: 20px; }

    /* ── Ruleta / Slot Machine ── */
    .roulette-slots {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 24px 0;
    }

    .roulette-slot {
      flex: 1;
      max-width: 220px;
      text-align: center;
    }

    .roulette-slot .slot-team-name {
      font-size: 13px;
      font-weight: bold;
      color: #ff9800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .roulette-slot .slot-window {
      background: #0f1720;
      border: 2px solid #7c4dff;
      border-radius: 12px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .roulette-slot .slot-window.spinning {
      border-color: #ff9800;
      box-shadow: 0 0 16px rgba(255,152,0,0.4);
    }

    .roulette-slot .slot-window.landed {
      border-color: #00d084;
      box-shadow: 0 0 20px rgba(0,208,132,0.5);
    }

    .roulette-slot .slot-name {
      font-size: 18px;
      font-weight: bold;
      color: white;
      padding: 0 12px;
      text-align: center;
      transition: opacity 0.05s;
    }

    .roulette-controls {
      text-align: center;
      margin-top: 10px;
    }

    /* ════════════════════════════════════════════════════════
       RESPONSIVE MÓVIL — max-width: 768px
    ════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {

      /* Escenario */
      .stage {
        padding: 16px 12px;
        gap: 10px;
      }

      /* Botones táctiles */
      .btn {
        padding: 12px 16px;
        font-size: 14px;
        min-height: 48px;
        border-radius: 10px;
      }

      /* Modal base */
      .modal-box {
        width: 97vw;
        max-height: 90vh;
        padding: 16px 14px;
        border-radius: 14px;
        overflow-y: auto;
      }

      .modal-box h2 {
        font-size: 17px;
        margin-bottom: 10px;
      }

      /* Modal resultado — de horizontal a vertical, imagen pequeña */
      #resultModal .modal-box {
        flex-direction: column !important;
        gap: 14px !important;
        align-items: stretch !important;
        max-width: 97vw !important;
      }

      #resultModal .modal-box > div:first-child {
        display: flex !important;
        justify-content: center !important;
      }

      #resultModal .modal-box > div:first-child img {
        width: 120px !important;
        border-radius: 10px !important;
      }

      #resultDynamicContent {
        font-size: 13px !important;
        line-height: 1.5 !important;
      }

      /* Opciones de pregunta */
      .option-row {
        padding: 10px 12px;
        margin-bottom: 8px;
      }

      .option-radios {
        margin-top: 8px !important;
      }

      .option-radios label {
        display: block;
        padding: 8px 6px;
        margin-right: 0;
        margin-bottom: 4px;
        font-size: 13px;
        background: rgba(255,255,255,0.03);
        border-radius: 6px;
      }

      .option-radios input[type="radio"] {
        width: 18px;
        height: 18px;
      }

      /* Modal footer — botones apilados en pantallas muy chicas */
      .modal-footer {
        flex-direction: column;
        gap: 8px;
      }

      .modal-footer .btn {
        width: 100%;
        text-align: center;
      }

      /* Registro */
      #registerModal .modal-box > div {
        flex-direction: column !important;
        gap: 10px !important;
      }

      .team-name-input, .reg-input {
        font-size: 16px; /* evita zoom automático en iOS */
      }

      /* Ruleta */
      .roulette-slots {
        gap: 12px;
        margin: 16px 0;
      }

      .roulette-slot .slot-window {
        height: 66px;
      }

      .roulette-slot .slot-name {
        font-size: 15px;
      }

      /* Ranking */
      #rankingContent {
        font-size: 14px !important;
      }

      /* Controles de volumen */
      #volumeControls {
        padding: 8px 10px !important;
        margin-top: 12px !important;
      }
    }

  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════════════
       ESCENARIO PRINCIPAL
  ══════════════════════════════════════════════════════ -->
  <div class="stage" id="stage"></div>


  <!-- ══════════════════════════════════════════════════════
       MODAL: RULETA DE SORTEO
       Se abre antes del modal de pregunta.
       Sortea un participante de cada equipo.
  ══════════════════════════════════════════════════════ -->
  <div id="rouletteModal" class="modal-overlay">
    <div class="modal-box" style="max-width:520px; text-align:center;">
      <h2>🎰 ¿QUIÉN RESPONDE?</h2>
      <p style="color:#aaa; font-size:14px; margin-top:-8px;">
        Presiona PLAY para sortear al representante de cada equipo
      </p>

      <div class="roulette-slots">
        <!-- Slot Equipo A -->
        <div class="roulette-slot">
          <div class="slot-team-name" id="rouletteNameA">Equipo A</div>
          <div class="slot-window" id="slotWindowA">
            <span class="slot-name" id="slotNameA">• • •</span>
          </div>
        </div>

        <!-- VS separador -->
        <div style="display:flex; align-items:center; font-size:22px;
                    font-weight:bold; color:#7c4dff; padding-top:24px;">VS</div>

        <!-- Slot Equipo B -->
        <div class="roulette-slot">
          <div class="slot-team-name" id="rouletteNameB">Equipo B</div>
          <div class="slot-window" id="slotWindowB">
            <span class="slot-name" id="slotNameB">• • •</span>
          </div>
        </div>
      </div>

      <div class="roulette-controls">
        <button id="roulettePlayBtn"     class="btn action" style="min-width:140px;">▶ PLAY</button>
        <button id="rouletteContinueBtn" class="btn next"   style="min-width:140px; display:none;">
          CONTINUAR →
        </button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       MODAL: PREGUNTAS
  ══════════════════════════════════════════════════════ -->
  <div id="questionModal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="questionTitle"></h2>
      <div id="optionsContainer"></div>
      <div class="modal-footer">
        <button id="registerAnswerBtn" class="btn action">REGISTRAR RESPUESTA</button>
        <button id="closeQuestionBtn"  class="btn back">CERRAR</button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       MODAL: REGISTRO DE EQUIPOS
  ══════════════════════════════════════════════════════ -->
  <div id="registerModal" class="modal-overlay">
    <div class="modal-box" style="max-width:700px;">
      <h2>REGISTRO DE EQUIPOS</h2>
      <div style="display:flex; gap:20px; margin-top:20px;">

        <div style="flex:1;">
          <input class="team-name-input" id="teamNameA"
                 placeholder="Nombre del Equipo A" maxlength="24">
          <input class="reg-input regA" placeholder="Jugador 1">
          <input class="reg-input regA" placeholder="Jugador 2">
          <input class="reg-input regA" placeholder="Jugador 3">
          <input class="reg-input regA" placeholder="Jugador 4">
          <input class="reg-input regA" placeholder="Jugador 5">
        </div>

        <div style="flex:1;">
          <input class="team-name-input" id="teamNameB"
                 placeholder="Nombre del Equipo B" maxlength="24">
          <input class="reg-input regB" placeholder="Jugador 1">
          <input class="reg-input regB" placeholder="Jugador 2">
          <input class="reg-input regB" placeholder="Jugador 3">
          <input class="reg-input regB" placeholder="Jugador 4">
          <input class="reg-input regB" placeholder="Jugador 5">
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn back" onclick="closeRegisterModal()">CERRAR</button>
        <button class="btn next" onclick="saveTeams()">COMENZAR</button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       MODAL: RANKING FINAL
  ══════════════════════════════════════════════════════ -->
  <div id="rankingModal" class="modal-overlay">
    <div class="modal-box">
      <h2>🏆 RESULTADOS FINALES</h2>
      <div id="rankingContent"></div>
      <div class="modal-footer">
        <button class="btn back"
          onclick="document.getElementById('rankingModal').style.display='none'">
          CERRAR
        </button>
        <button id="closeRankingBtn" class="btn final">FINALIZAR Y VOLVER AL INICIO</button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       MODAL: RESULTADO DE PREGUNTA
  ══════════════════════════════════════════════════════ -->
  <div id="resultModal" class="modal-overlay">
    <div class="modal-box" style="max-width:950px; display:flex; gap:40px; align-items:center;">

      <div style="flex:1; display:flex; justify-content:center; align-items:center;">
        <div style="background:#0f1720; padding:20px; border-radius:20px;
                    box-shadow:0 0 25px rgba(0,0,0,0.6);">
          <img src="./BASE/R1.jpg" style="width:340px; border-radius:18px; display:block;">
        </div>
      </div>

      <div style="flex:1.3;">
        <h2 style="margin-top:0;">RESULTADO DE LA PREGUNTA</h2>
        <div id="resultDynamicContent" style="font-size:16px; line-height:1.6;"></div>
        <div style="margin-top:30px; text-align:center;">
          <button id="continueAfterResultBtn" class="btn next">CONTINUAR</button>
        </div>
      </div>

    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       SCRIPTS — orden de carga obligatorio
  ══════════════════════════════════════════════════════ -->

  <script src="./core/config.js"></script>
  <script src="./core/state.js"></script>
  <script src="./core/factory.js"></script>
  <script src="./core/api.js"></script>

  <script src="./adventures/racks.js"></script>
  <script src="./adventures/sensible.js"></script>
  <script src="./adventures/minirack.js"></script>
  <script src="./adventures/ecommerce.js"></script>

  <script src="./ui/render.js"></script>
  <script src="./ui/modals.js"></script>

  <script>
    const { SCENES, ADVENTURES } = buildSceneIndex();
    renderScene(1);
  </script>

</body>
</html>
