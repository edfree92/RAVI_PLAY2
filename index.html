<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DINET - LOYAL FRIENDS 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    /* =====================================================
       ESTILOS GENERALES
    ===================================================== */

    :root {
      --btn-next:    #00d084;
      --btn-back:    #6c757d;
      --btn-action:  #ff9800;
      --btn-final:   #2196f3;
      --btn-danger:  #e53935;
      --btn-primary: #7c4dff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #0b0f14;
    }

    /* ---- Escenario principal ---- */
    .stage {
      height: 100vh;
      width: 100vw;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding: 40px;
      gap: 20px;
      transition: opacity 0.6s ease;
    }

    .stage.fade-out { opacity: 0; }
    .stage.fade-in  { opacity: 1; }

    /* ---- Botones ---- */
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      color: white;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .next    { background: var(--btn-next);    }
    .back    { background: var(--btn-back);    }
    .action  { background: var(--btn-action);  }
    .final   { background: var(--btn-final);   }
    .danger  { background: var(--btn-danger);  }
    .primary { background: var(--btn-primary); }

    /* ---- Base modal (overlay) ---- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    /* ---- Caja interior de modal ---- */
    .modal-box {
      background: #1c2430;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      color: white;
    }

    .modal-box h2 {
      margin-top: 0;
      text-align: center;
    }

    /* ---- Fila de opciones (preguntas) ---- */
    .option-row {
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid #555;
      border-radius: 8px;
    }

    /* ---- Inputs de registro ---- */
    .reg-input {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f1720;
      color: white;
      font-size: 14px;
    }

    .reg-input::placeholder { color: #888; }

    /* ---- Footer de modal (botones) ---- */
    .modal-footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
    }

    /* ---- Ranking ---- */
    #rankingModal .modal-box {
      max-width: 680px;
    }

    #rankingContent {
      font-size: 16px;
      margin-bottom: 20px;
    }

  </style>
</head>

<body>

  <!-- =====================================================
       ESCENARIO PRINCIPAL
       (viñeta 1 + todas las aventuras se renderizan aquí)
  ===================================================== -->
  <div class="stage" id="stage"></div>

       MODAL: PREGUNTAS
  ===================================================== -->

        <button id="registerAnswerBtn" class="btn action">REGISTRAR RESPUESTA</button>

      </div>

    </div>
  </div>


  <!-- =====================================================
       MODAL: REGISTRO DE EQUIPOS
  ===================================================== -->

          <input class="reg-input regB" placeholder="Nombre 5">

      <div class="modal-footer">
        <button class="btn back" onclick="closeRegisterModal()">CERRAR</button>

      </div>

  </div>

       MODAL: RANKING FINAL
  ===================================================== -->
  <div id="rankingModal" class="modal-overlay">

      <div class="modal-footer">
        <button class="btn back" onclick="document.getElementById('rankingModal').style.display='none'">CERRAR</button>

      </div>

    </div>
  </div>

       MODAL: RESULTADO DE PREGUNTA CON IMAGEN RAVI
  ===================================================== -->

      return {
        sessionId:      crypto.randomUUID(),
        createdAt:      new Date().toISOString(),
        startAtSession: new Date().toISOString(),
        endAtSession:   null,

          A: teamAPlayers.map(name => ({
            playerId:    crypto.randomUUID(),
            name,
            totalPoints: 0
          })),
          B: teamBPlayers.map(name => ({
            playerId:    crypto.randomUUID(),
            name,
            totalPoints: 0
          }))
        },

        runs:   [],
        totals: { A: 0, B: 0 }
      };
    }

    function createRun(adventureKey) {
      return {
        runId:        crypto.randomUUID(),
        sessionId:    appState.currentSession.sessionId,
        adventureKey,
        startAtRun:   new Date().toISOString(),
        endAtRun:     null,

        teamScore:    { A: 0, B: 0 },
        playerScore:  {},
        answers:      []
      };
    }


    /* =====================================================
       PARTE 1 — MOTOR DE ESCENAS
    ===================================================== */

    let currentSceneId = 1;
    const stage = document.getElementById("stage");

    // Declarado con let para poder ser sobreescrito por el wrapper de fade
    let renderScene = function(id) {

      // CORRECCIÓN 2 — viñeta 1.5 integrada al motor
      if (id === 1.5) {
        renderMapScene();
        return;
      }

      const scene = SCENES[id];
      if (!scene) return;

      currentSceneId = id;

      stage.style.backgroundImage = `
        linear-gradient(
          to top,
          rgba(0,0,0,0.65) 0%,
          rgba(0,0,0,0.20) 50%,
          rgba(0,0,0,0.00) 100%
        ), url("${scene.bg}")
      `;

      stage.innerHTML = "";

      if (scene.type === "INITIAL")   renderInitial();
      if (scene.type === "NARRATIVE") renderNarrative();
      if (scene.type === "QUESTION")  renderQuestion();
      if (scene.type === "FINAL")     renderFinal();
    };


    /* =====================================================
       CORRECCIÓN 2 — renderMapScene()
       Viñeta 1.5 como escena real del motor
    ===================================================== */

    function renderMapScene() {
      if (!appState.currentSession) {
        renderScene(1);
        return;
      }

      stage.style.backgroundImage = `url("./BASE/1.5.jpg")`;
      stage.innerHTML = "";

      // Contenedor con flex-wrap para que los 4 botones siempre sean visibles
      const container = document.createElement("div");
      container.style.display        = "flex";
      container.style.flexWrap       = "wrap";
      container.style.justifyContent = "center";
      container.style.gap            = "20px";
      container.style.width          = "100%";
      container.style.marginBottom   = "40px";

      // CORRECCIÓN 2 — solo RACKS activo; las demás muestran aviso
      container.appendChild(createButton("RACKS",     "primary", () => startAdventure("RACKS")));
      container.appendChild(createButton("SENSIBLE",  "primary", () => alert("Próximamente disponible")));
      container.appendChild(createButton("MINIRACK",  "primary", () => alert("Próximamente disponible")));
      container.appendChild(createButton("ECOMMERCE", "primary", () => alert("Próximamente disponible")));

      stage.appendChild(container);

      stage.appendChild(createButton("VER PUNTUACIÓN", "final",  showRanking));
      stage.appendChild(createButton("CAMBIAR EQUIPOS","danger",  changeRoster));
    }


    /* =====================================================
       CORRECCIÓN 3 — startAdventure()
    ===================================================== */

    function startAdventure(adventureKey) {
      // CORRECCIÓN 5 — bloqueo de seguridad: solo RACKS activo
      if (adventureKey !== "RACKS") {
        alert("Esta aventura aún no está disponible.");
        return;
      }

      if (!appState.currentSession) {
        renderScene(1);
        return;
      }

      const run = createRun(adventureKey);
      appState.currentAdventureKey = adventureKey;
      appState.currentRun          = run;

      const firstSceneId = ADVENTURES[adventureKey][0];
      renderScene(firstSceneId);
    }


    /* =====================================================
       CORRECCIÓN 5 — finishRun()
       Finaliza la aventura y vuelve al mapa
    ===================================================== */

    function finishRun() {
      // CORRECCIÓN 4 — primero cerrar el run, luego enviar
      appState.currentRun.endAtRun = new Date().toISOString();
      appState.currentRun.status   = "finished";

      // CORRECCIÓN 10 — stub API
      sendRunToAPI(appState.currentRun);

      appState.currentSession.runs.push(appState.currentRun);
      appState.currentRun          = null;
      appState.currentAdventureKey = null;

      console.log("Run finalizado. Runs totales:", appState.currentSession.runs.length);

      // CORRECCIÓN 5 — volver al mapa
      renderScene(1.5);
    }


    /* =====================================================
       CORRECCIÓN 6 — changeRoster()
       Cierra sesión y vuelve al registro
    ===================================================== */

    function changeRoster() {
      if (appState.currentSession) {
        appState.currentSession.endAtSession = new Date().toISOString();
      }

      appState.currentSession      = null;
      appState.currentRun          = null;
      appState.currentAdventureKey = null;

      // Limpiar inputs del formulario
      document.querySelectorAll(".regA, .regB").forEach(i => i.value = "");

      renderScene(1);
    }

    ===================================================== */

      document.getElementById("registerModal").style.display = "flex";
    }

      document.getElementById("registerModal").style.display = "none";
    }

      const teamANames = [];

          { id:"D", text:"Tomar foto y continuar con inventario.",                   points:  5 }
        ]
      },
      "ECOMMERCE-38": {

        text: "¿Qué MOVIMIENTOS SE PUEDEN RASTREAR EN EL SISTEMA WMS QUE PUEDEN GENERAR UN DESCUADRE EN PMM?",
        options: [
          { id:"A", text:"Revisar la cantidad de cajas picadas en el pasillo.", points: 10 },
          { id:"B", text:"Mercadería paletizada con PL0 cuando debió ser PL1.", points: 15 },
          { id:"C", text:"Revisar ajustes de códigos prepack en la 204.",        points: 20 },

    };

    // Obtiene la pregunta activa según aventura + sceneId global
    function getCurrentQuestion() {
      const key = appState.currentAdventureKey;
      if (!key) return null;
      return questions[`${key}-${currentSceneId}`] || null;
    }


    /* =====================================================
       PARTE 3 — REGISTRO DE RESPUESTA
    ===================================================== */

    // Declarado con let para poder ser sobreescrito por el wrapper de resultado
    let registerAnswer = function() {
      const question = getCurrentQuestion();
      if (!question) {
        closeQuestionModal();
        return;
      }

      const selectedA = document.querySelector('input[name="A"]:checked');
      const selectedB = document.querySelector('input[name="B"]:checked');

      // CORRECCIÓN 7 — bloquear si no hay respuesta
      if (!selectedA || !selectedB) {
        alert("Ambos equipos deben responder antes de continuar.");
        return;
      }

      const optionA = question.options.find(o => o.id === selectedA.value);
      const optionB = question.options.find(o => o.id === selectedB.value);

      const pointsA = optionA ? optionA.points : 0;
      const pointsB = optionB ? optionB.points : 0;

      const bestOption = question.options.reduce((max, cur) =>
        cur.points > max.points ? cur : max
      );

      // Construir evento de respuesta
      const answerEvent = {
        runId:      appState.currentRun.runId,
        timestamp:  new Date().toISOString(),
        questionId: question.questionId,
        sceneId:    currentSceneId,
        selected:   { A: selectedA.value, B: selectedB.value },
        points:     { A: pointsA, B: pointsB },
        bestOption: bestOption.id,
        meta: { adventureKey: appState.currentRun.adventureKey }
      };

      // Registrar en el run activo
      appState.currentRun.answers.push(answerEvent);
      appState.currentRun.teamScore.A += pointsA;
      appState.currentRun.teamScore.B += pointsB;

      // CORRECCIÓN 9 — acumulación por integrante y totales de sesión
      appState.currentSession.teams.A.forEach(p => { p.totalPoints += pointsA; });
      appState.currentSession.teams.B.forEach(p => { p.totalPoints += pointsB; });
      appState.currentSession.totals.A += pointsA;
      appState.currentSession.totals.B += pointsB;

      console.log("Respuesta registrada:", answerEvent);
      console.log("Totales sesión → A:", appState.currentSession.totals.A, "| B:", appState.currentSession.totals.B);

      closeQuestionModal();
    };


    /* =====================================================
       PARTE 4 — RANKING FINAL (acumulado de sesión)
    ===================================================== */

    function showRanking() {
      const session = appState.currentSession;
      if (!session) {
        alert("No hay sesión activa.");
        return;
      }

      const totA = session.totals.A;
      const totB = session.totals.B;

      let runsHTML = "";
      session.runs.forEach(run => {
        runsHTML += `
          <p style="margin:6px 0;">
            <strong>${run.adventureKey}:</strong>
            Equipo A ${run.teamScore.A} pts — Equipo B ${run.teamScore.B} pts
          </p>`;
      });

      const playersA = session.teams.A.map(p => `${p.name}: ${p.totalPoints} pts`).join(" | ") || "—";
      const playersB = session.teams.B.map(p => `${p.name}: ${p.totalPoints} pts`).join(" | ") || "—";

      let winner = "";
      if      (totA > totB) winner = `<h3 style="color:#00d084;">🥇 GANADOR: EQUIPO A</h3>`;
      else if (totB > totA) winner = `<h3 style="color:#00d084;">🥇 GANADOR: EQUIPO B</h3>`;
      else                  winner = `<h3>🤝 EMPATE</h3>`;

      document.getElementById("rankingContent").innerHTML = `
        <p><strong>Aventuras jugadas:</strong> ${session.runs.length}</p>
        ${runsHTML}
        <hr style="margin:16px 0; border-color:#444;">
        <p><strong>TOTAL Equipo A:</strong> ${totA} pts</p>
        <p style="font-size:13px; color:#aaa;">${playersA}</p>
        <p><strong>TOTAL Equipo B:</strong> ${totB} pts</p>
        <p style="font-size:13px; color:#aaa;">${playersB}</p>
        <hr style="margin:16px 0; border-color:#444;">
        ${winner}
      `;

      document.getElementById("rankingModal").style.display = "flex";
    }

    document.getElementById("closeRankingBtn").addEventListener("click", function () {
      if (appState.currentSession) {
        appState.currentSession.endAtSession = new Date().toISOString();
      }
      appState.currentSession      = null;
      appState.currentRun          = null;
      appState.currentAdventureKey = null;

      document.getElementById("rankingModal").style.display = "none";
      renderScene(1);
    });


    /* =====================================================
       RENDERS
    ===================================================== */

    function createButton(text, cssClass, action) {
      const btn = document.createElement("button");
      btn.textContent = text;
      btn.className   = "btn " + cssClass;
      btn.onclick     = action;
      return btn;
    }

    // Navega a la siguiente escena dentro de la aventura activa
    function nextScene() {
      const key    = appState.currentAdventureKey;
      const list   = key ? ADVENTURES[key] : null;
      if (!list) return;
      const idx    = list.indexOf(currentSceneId);
      if (idx === -1 || idx === list.length - 1) return; // ya en la última
      renderScene(list[idx + 1]);
    }

    // Navega a la escena anterior dentro de la aventura activa
    function prevScene() {
      const key  = appState.currentAdventureKey;
      const list = key ? ADVENTURES[key] : null;
      if (!list) return;
      const idx  = list.indexOf(currentSceneId);
      if (idx <= 0) {
        // Primera escena de la aventura → volver al mapa
        renderScene(1.5);
        return;
      }
      renderScene(list[idx - 1]);
    }

    function renderInitial() {
      stage.appendChild(createButton("REGISTRO",  "action", openRegisterModal));
      stage.appendChild(createButton("SIGUIENTE", "next",   () => renderScene(1.5)));
    }

    function renderNarrative() {
      stage.appendChild(createButton("ATRÁS",     "back", prevScene));
      stage.appendChild(createButton("SIGUIENTE", "next", nextScene));
    }

    // CORRECCIÓN 8 — en preguntas NO hay botón SIGUIENTE
    function renderQuestion() {
      stage.appendChild(createButton("ATRÁS",     "back",   prevScene));
      stage.appendChild(createButton("RESPONDER", "action", openQuestionModal));
    }

    function renderFinal() {
      stage.appendChild(createButton("VER RESULTADO",      "action", showRanking));
      stage.appendChild(createButton("FINALIZAR AVENTURA", "final",  finishRun));
    }


    /* =====================================================
       MODAL — LÓGICA DE PREGUNTAS
    ===================================================== */

    function openQuestionModal() {
      const question = getCurrentQuestion();
      if (!question) return;

      document.getElementById("questionTitle").textContent = question.text;

      const container = document.getElementById("optionsContainer");
      container.innerHTML = "";

      question.options.forEach(opt => {
        const row = document.createElement("div");
        row.className = "option-row";
        row.innerHTML = `
          <strong>${opt.id})</strong> ${opt.text}
          <div style="margin-top:5px;">
            Equipo A <input type="radio" name="A" value="${opt.id}">
            &nbsp;&nbsp;
            Equipo B <input type="radio" name="B" value="${opt.id}">
          </div>
        `;
        container.appendChild(row);
      });

      document.getElementById("questionModal").style.display = "flex";
    }

    function closeQuestionModal() {
      document.getElementById("questionModal").style.display = "none";
    }

    document.getElementById("registerAnswerBtn").addEventListener("click", () => registerAnswer());
    document.getElementById("closeQuestionBtn").addEventListener("click",  closeQuestionModal);


    /* =====================================================
       MODAL RESULTADO CON IMAGEN RAVI
       (wrapper sobre registerAnswer)
    ===================================================== */

    function showResultAfterRegister() {
      const run = appState.currentRun;
      if (!run || run.answers.length === 0) return;

      const lastAnswer = run.answers[run.answers.length - 1];
      const question   = questions[lastAnswer.questionId];
      if (!question) return;

      const optionA    = question.options.find(o => o.id === lastAnswer.selected.A);
      const optionB    = question.options.find(o => o.id === lastAnswer.selected.B);
      const bestOption = question.options.find(o => o.id === lastAnswer.bestOption);

      const content = `
        <p><strong>Equipo A respondió:</strong> ${optionA.id}) ${optionA.text}
           <span style="color:#00d084;"> +${lastAnswer.points.A} pts</span></p>
        <p><strong>Equipo B respondió:</strong> ${optionB.id}) ${optionB.text}
           <span style="color:#00d084;"> +${lastAnswer.points.B} pts</span></p>
        <hr style="margin:20px 0; border-color:#444;">
        <p><strong>🏆 Mejor respuesta:</strong>
           ${bestOption.id}) ${bestOption.text}
           <span style="color:#ffd700;"> +${bestOption.points} pts</span></p>
        <hr style="margin:20px 0; border-color:#444;">
        <p><strong>Marcador esta aventura:</strong>
           A: ${run.teamScore.A} pts &nbsp;|&nbsp; B: ${run.teamScore.B} pts</p>
        <p><strong>Marcador acumulado (sesión):</strong>
           A: ${appState.currentSession.totals.A} pts &nbsp;|&nbsp; B: ${appState.currentSession.totals.B} pts</p>
      `;

      document.getElementById("resultDynamicContent").innerHTML = content;
      document.getElementById("resultModal").style.display = "flex";
    }

    const _baseRegisterAnswer = registerAnswer;
    registerAnswer = function() {
      const prevCount = appState.currentRun ? appState.currentRun.answers.length : 0;
      _baseRegisterAnswer();
      const newCount  = appState.currentRun ? appState.currentRun.answers.length : 0;
      if (newCount > prevCount) {
        setTimeout(showResultAfterRegister, 200);
      }
    };

    // CORRECCIÓN 8 — "CONTINUAR" desde el modal avanza al siguiente
    document.getElementById("continueAfterResultBtn").addEventListener("click", function () {
      document.getElementById("resultModal").style.display = "none";
      nextScene();
    });


    /* =====================================================
       CORRECCIÓN 10 — STUB API
    ===================================================== */

    function sendRunToAPI(run) {
      console.log("Enviando run al backend:", run);
      // fetch("/api/run", {
      //   method: "POST",
      //   headers: { "Content-Type": "application/json" },
      //   body: JSON.stringify(run)
      // });
    }


    /* =====================================================
       TRANSICIÓN DE ESCENAS CON FADE SUAVE
       (wrapper sobre renderScene)
    ===================================================== */

    const _baseRenderScene = renderScene;
    renderScene = function(id) {
      stage.classList.add("fade-out");
      setTimeout(() => {
        _baseRenderScene(id);
        stage.classList.remove("fade-out");
        stage.classList.add("fade-in");
        setTimeout(() => {
          stage.classList.remove("fade-in");
        }, 600);
      }, 400);
    };


    /* =====================================================
       INICIALIZACIÓN
    ===================================================== */

    renderScene(1);

  </script>
